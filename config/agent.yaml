log:
  level: debug
  format: console

observability:
  metrics_enabled: true
  metrics_addr: :9092

agent:
  gateway_addr: localhost:4433
  gateway_addrs:
    - localhost:4433
    - localhost:4434
  token: dev-token
  tunnels:
    - label: web
      local_addr: localhost:3000
    - label: api
      local_addr: localhost:8080
  reconnect_delay: 2s
  max_reconnect: 0
  heartbeat_interval: 15s
  quic_timeout: 30s
  stream_idle_timeout: 30s
  tls_insecure: true
  # Phase 3: mTLS — present a client certificate to the gateway
  # mtls_enabled: false
  # client_cert_file: /path/to/certs/agent.crt
  # client_key_file: /path/to/certs/agent.key
  # tls_ca_file: /path/to/certs/ca.crt
  # Phase 4: region routing and session resume
  # preferred_region: us-east-1
  # session_resume_enabled: true
  # Per-tunnel protocol — add tunnel_type: udp for UDP tunnels (default: tcp)
  # tunnels:
  #   - label: web
  #     local_addr: localhost:3000
  #     tunnel_type: tcp
  #   - label: game
  #     local_addr: localhost:7777
  #     tunnel_type: udp
