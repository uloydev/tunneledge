log:
  level: debug
  format: console

dashboard:
  http_listen_addr: :8080
  jwt_secret: "change-me-in-production-use-a-strong-secret"
  jwt_ttl: 24h
  base_url: "http://localhost:8080"
  smtp_host: localhost
  smtp_port: 1025
  smtp_from: "noreply@tunneledge.dev"
  # Phase 3: security hardening
  # refresh_token_enabled: true
  # refresh_token_ttl: 168h   # 7 days
  # auth_rate_limit_rpm: 20
  # max_failed_logins: 10
  # lockout_duration: 15m

db:
  driver: postgres
  dsn: "host=localhost port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable"
  auto_migrate: true
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 5m
