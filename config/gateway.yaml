log:
  level: debug
  format: console

observability:
  metrics_enabled: true
  metrics_addr: :9090

gateway:
  quic_listen_addr: :4433
  public_listen_addr: :443
  base_domain: tunneledge.dev
  registry_addr: localhost:50051
  relay_id: gateway-1
  advertise_addr: localhost:4433
  # registry_tls_cert: /path/to/registry-ca.pem
  # Set to "insecure" (default) to skip TLS verification for dev.
  registry_tls_cert: insecure
  lease_ttl: 45s
  health_report_interval: 15s
  shutdown_timeout: 15s
  max_streams: 1000
  stream_idle_timeout: 30s
  # Phase 3: mTLS — require client certificates from agents
  # mtls_enabled: false
  # client_ca_file: /path/to/certs/ca.crt
  # Phase 3: rate limiting and quotas
  # auth_rate_limit_rpm: 60
  # max_tunnels_per_agent: 10
  # max_streams_per_tunnel: 100
  # Phase 4: region routing, session resume, UDP tunnels
  # region: us-east-1
  # session_resume_enabled: true
  # session_resume_ttl: 30s
  # udp_listen_addr: :4434

db:
  driver: postgres
  dsn: "host=localhost port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable"
  auto_migrate: true
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 5m
