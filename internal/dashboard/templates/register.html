{{define "title"}}Create Account — TunnelEdge{{end}}
{{define "content"}}
<div class="min-h-full flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md space-y-8">
    <!-- Logo -->
    <div class="text-center">
      <div class="inline-flex items-center gap-2 mb-2">
        <svg class="w-8 h-8 text-brand-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span class="text-2xl font-bold text-white">TunnelEdge</span>
      </div>
      <p class="text-slate-400 text-sm">Create your account to get started</p>
    </div>

    <!-- Card -->
    <div class="bg-surface-800 border border-surface-700 rounded-xl p-8 shadow-xl" x-data="registerForm()">
      <div id="reg-error" class="mb-4 hidden p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center"></div>
      <div id="reg-success" class="mb-4 hidden p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm text-center"></div>

      <form @submit.prevent="submit" class="space-y-5" x-show="!done" x-cloak>
        <div>
          <label for="name" class="block text-sm font-medium text-slate-300 mb-1.5">Name</label>
          <input type="text" id="name" x-model="name" required
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="Your name">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
          <input type="email" id="email" x-model="email" required
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input type="password" id="password" x-model="password" required minlength="8"
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="At least 8 characters">
        </div>

        <div>
          <label for="confirm" class="block text-sm font-medium text-slate-300 mb-1.5">Confirm Password</label>
          <input type="password" id="confirm" x-model="confirm" required
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="••••••••">
        </div>

        <button type="submit" :disabled="loading"
          class="w-full flex items-center justify-center gap-2 rounded-lg bg-brand-500 hover:bg-brand-600 disabled:opacity-50 px-4 py-2.5 text-white font-semibold transition">
          <svg x-show="loading" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span x-text="loading ? 'Creating…' : 'Create Account'"></span>
        </button>
      </form>

      <!-- Success state -->
      <div x-show="done" x-cloak class="text-center py-4 space-y-4">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-500/10 mb-2">
          <svg class="w-8 h-8 text-brand-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h3 class="text-lg font-semibold text-white">Check your email</h3>
        <p class="text-slate-400 text-sm">We've sent a verification link to <span class="text-brand-400 font-medium" x-text="email"></span></p>
        <p class="text-slate-500 text-xs">The link expires in 24 hours</p>
        <button @click="resend" :disabled="resending" class="mt-2 text-sm text-brand-400 hover:text-brand-300 underline">
          <span x-text="resending ? 'Sending…' : 'Resend verification email'"></span>
        </button>
      </div>

      <p class="mt-6 text-center text-sm text-slate-400">
        Already have an account?
        <a href="/login" class="text-brand-400 hover:text-brand-300 font-medium">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script>
function registerForm() {
  return {
    name: '', email: '', password: '', confirm: '', loading: false, done: false, resending: false,
    async submit() {
      const errEl = document.getElementById('reg-error');
      errEl.classList.add('hidden');
      if (this.password !== this.confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.classList.remove('hidden');
        return;
      }
      this.loading = true;
      try {
        const res = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: this.name, email: this.email, password: this.password })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Registration failed';
          errEl.classList.remove('hidden');
          return;
        }
        this.done = true;
      } catch {
        errEl.textContent = 'Network error, please try again';
        errEl.classList.remove('hidden');
      } finally { this.loading = false; }
    },
    async resend() {
      this.resending = true;
      try {
        await fetch('/api/v1/auth/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: this.email })
        });
        window.dispatchEvent(new CustomEvent('notify', { detail: { message: 'Verification email resent', type: 'success' } }));
      } catch {} finally { this.resending = false; }
    }
  }
}
</script>
{{end}}
