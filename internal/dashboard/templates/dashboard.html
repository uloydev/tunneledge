{{define "title"}}Dashboard — TunnelEdge{{end}}
{{define "content"}}
<div class="min-h-full flex" x-data="dashboardShell()" x-init="init()">
  <!-- Mobile sidebar overlay -->
  <div x-show="sidebarOpen" x-cloak @click="sidebarOpen = false"
    class="fixed inset-0 z-30 bg-black/50 lg:hidden" x-transition.opacity></div>

  <!-- Sidebar -->
  <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed inset-y-0 left-0 z-40 w-64 bg-surface-800 border-r border-surface-700 flex flex-col transition-transform duration-200 lg:translate-x-0 lg:static lg:z-auto">
    <!-- Brand -->
    <div class="flex items-center gap-2 px-5 h-16 border-b border-surface-700">
      <svg class="w-6 h-6 text-brand-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      <span class="text-lg font-bold text-white">TunnelEdge</span>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <a href="/dashboard" hx-get="/partials/overview" hx-target="#main-content" hx-push-url="/dashboard"
        @click="sidebarOpen=false; currentPage='overview'"
        :class="currentPage === 'overview' ? 'bg-surface-700 text-white' : 'text-slate-400 hover:bg-surface-700/50 hover:text-white'"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
        Overview
      </a>
      <a href="/dashboard/agents" hx-get="/partials/agents" hx-target="#main-content" hx-push-url="/dashboard/agents"
        @click="sidebarOpen=false; currentPage='agents'"
        :class="currentPage === 'agents' ? 'bg-surface-700 text-white' : 'text-slate-400 hover:bg-surface-700/50 hover:text-white'"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7"/></svg>
        Agents
      </a>
      <a href="/dashboard/sessions" hx-get="/partials/sessions" hx-target="#main-content" hx-push-url="/dashboard/sessions"
        @click="sidebarOpen=false; currentPage='sessions'"
        :class="currentPage === 'sessions' ? 'bg-surface-700 text-white' : 'text-slate-400 hover:bg-surface-700/50 hover:text-white'"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
        Active Sessions
      </a>
    </nav>

    <!-- User info -->
    <div class="px-3 py-4 border-t border-surface-700">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-8 h-8 rounded-full bg-brand-500/20 flex items-center justify-center text-brand-400 text-sm font-bold" x-text="user?.name?.charAt(0)?.toUpperCase() || '?'"></div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate" x-text="user?.name || 'Loading...'"></p>
          <p class="text-xs text-slate-500 truncate" x-text="user?.email || ''"></p>
        </div>
        <button @click="logout()" class="text-slate-500 hover:text-red-400 transition" title="Sign out">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col min-h-full lg:ml-0">
    <!-- Top bar (mobile) -->
    <header class="flex items-center gap-4 px-4 h-16 border-b border-surface-700 bg-surface-800 lg:hidden">
      <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span class="font-bold text-white">TunnelEdge</span>
      </div>
    </header>

    <!-- Content -->
    <main id="main-content" class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto fade-in">
      {{block "page-content" .}}{{end}}
    </main>
  </div>
</div>

<script>
function dashboardShell() {
  return {
    sidebarOpen: false,
    currentPage: '{{.CurrentPage}}',
    user: null,
    async init() {
      try {
        const res = await fetch('/api/v1/auth/me');
        if (res.ok) this.user = await res.json();
        else window.location.href = '/login';
      } catch { window.location.href = '/login'; }
    },
    async logout() {
      await fetch('/api/v1/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }
  }
}
</script>
{{end}}
