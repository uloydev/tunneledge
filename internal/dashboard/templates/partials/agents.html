<!-- Agents partial loaded via HTMX -->
<div class="space-y-6" x-data="agentsPage()" x-init="load()">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-white">Agents</h1>
      <p class="text-slate-400 text-sm mt-1">Manage your tunnel agents and configurations</p>
    </div>
    <button @click="showCreate = true" class="inline-flex items-center gap-2 px-4 py-2.5 bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      New Agent
    </button>
  </div>

  <!-- Create Agent Modal -->
  <div x-show="showCreate" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="showCreate = false">
    <div class="absolute inset-0 bg-black/60" @click="showCreate = false" x-transition.opacity></div>
    <div class="relative bg-surface-800 border border-surface-700 rounded-xl p-6 w-full max-w-md shadow-2xl" x-transition>
      <h3 class="text-lg font-semibold text-white mb-4">Create New Agent</h3>
      <form @submit.prevent="createAgent" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Agent Name</label>
          <input type="text" x-model="newAgent.name" required
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="My Web Server">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Agent ID</label>
          <input type="text" x-model="newAgent.agent_id" required pattern="^[a-z0-9]([a-z0-9-]{0,62}[a-z0-9])?$"
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition font-mono"
            placeholder="my-web-server">
          <p class="text-xs text-slate-500 mt-1">Lowercase, numbers, hyphens. Used in tunnel URLs.</p>
        </div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" @click="showCreate = false" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition">Cancel</button>
          <button type="submit" :disabled="creating" class="px-4 py-2 bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white text-sm font-semibold rounded-lg transition">
            <span x-text="creating ? 'Creating…' : 'Create'"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Token reveal modal -->
  <div x-show="tokenRevealed" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60" @click="tokenRevealed = false" x-transition.opacity></div>
    <div class="relative bg-surface-800 border border-surface-700 rounded-xl p-6 w-full max-w-lg shadow-2xl" x-transition>
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full flex items-center justify-center" :class="tokenRevealContext === 'rotated' ? 'bg-amber-500/10' : 'bg-emerald-500/10'">
          <svg class="w-5 h-5" :class="tokenRevealContext === 'rotated' ? 'text-amber-400' : 'text-emerald-400'" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
        </div>
        <div>
          <h3 class="text-lg font-semibold text-white" x-text="tokenRevealContext === 'rotated' ? 'Token Rotated' : 'Agent Token Created'"></h3>
          <p class="text-sm text-slate-400" x-text="tokenRevealContext === 'rotated' ? 'Old token is now invalid. Save the new token.' : 'Save this token — it won\'t be shown again!'"></p>
        </div>
      </div>
      <div class="bg-surface-900 border border-surface-700 rounded-lg p-4 font-mono text-sm text-brand-400 break-all select-all" x-text="revealedToken"></div>
      <div class="flex justify-end gap-3 pt-4">
        <button @click="copyToken()" class="px-4 py-2 text-sm text-brand-400 hover:text-brand-300 font-medium transition">Copy</button>
        <button @click="tokenRevealed = false" class="px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold rounded-lg transition">Done</button>
      </div>
    </div>
  </div>

  <!-- Confirm action modal (for delete/rotate) -->
  <div x-show="confirm.show" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="confirm.show = false">
    <div class="absolute inset-0 bg-black/60" @click="confirm.show = false" x-transition.opacity></div>
    <div class="relative bg-surface-800 border border-surface-700 rounded-xl p-6 w-full max-w-sm shadow-2xl" x-transition>
      <div class="flex items-start gap-4 mb-5">
        <div class="w-10 h-10 rounded-full shrink-0 flex items-center justify-center"
             :class="confirm.danger ? 'bg-red-500/10' : 'bg-amber-500/10'">
          <svg class="w-5 h-5" :class="confirm.danger ? 'text-red-400' : 'text-amber-400'"
               fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
        </div>
        <div>
          <h3 class="text-base font-semibold text-white" x-text="confirm.title"></h3>
          <p class="text-sm text-slate-400 mt-1" x-text="confirm.message"></p>
        </div>
      </div>
      <div class="flex justify-end gap-3">
        <button @click="confirm.show = false" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition">Cancel</button>
        <button @click="confirm.onOk(); confirm.show = false"
                class="px-4 py-2 text-sm font-semibold rounded-lg transition text-white"
                :class="confirm.danger ? 'bg-red-500 hover:bg-red-600' : 'bg-amber-500 hover:bg-amber-600'"
                x-text="confirm.okLabel || 'Confirm'">
        </button>
      </div>
    </div>
  </div>

  <!-- IP ACL Management Modal -->
  <div x-show="showACL" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="showACL = false">
    <div class="absolute inset-0 bg-black/60" @click="showACL = false" x-transition.opacity></div>
    <div class="relative bg-surface-800 border border-surface-700 rounded-xl p-6 w-full max-w-lg shadow-2xl" x-transition>
      <div class="flex items-center justify-between mb-4">
        <div>
          <h3 class="text-lg font-semibold text-white">IP Access Rules</h3>
          <p class="text-xs text-slate-400 mt-0.5">Agent: <span class="text-brand-400 font-mono" x-text="aclAgent?.agent_id"></span></p>
        </div>
        <button @click="showACL = false" class="text-slate-500 hover:text-white transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="mb-4 space-y-2 max-h-48 overflow-y-auto">
        <template x-if="aclRules.length === 0">
          <p class="text-xs text-slate-500 italic text-center py-4">No rules — all IPs allowed</p>
        </template>
        <template x-for="rule in aclRules" :key="rule.id">
          <div class="flex items-center justify-between bg-surface-900 rounded-lg px-3 py-2">
            <div class="flex items-center gap-2.5 min-w-0">
              <span class="text-xs font-bold px-1.5 py-0.5 rounded shrink-0"
                    :class="rule.acl_type === 'allow' ? 'bg-emerald-500/15 text-emerald-400' : 'bg-red-500/15 text-red-400'"
                    x-text="rule.acl_type.toUpperCase()"></span>
              <span class="text-sm font-mono text-slate-200 truncate" x-text="rule.cidr"></span>
            </div>
            <button @click="deleteACLRule(rule)" class="text-slate-600 hover:text-red-400 transition ml-2 shrink-0">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </template>
      </div>
      <form @submit.prevent="addACLRule" class="flex gap-2 items-end border-t border-surface-700 pt-4">
        <div class="flex-1">
          <label class="block text-xs font-medium text-slate-400 mb-1">CIDR</label>
          <input type="text" x-model="newACL.cidr" required placeholder="192.168.0.0/24"
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-3 py-2 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500 font-mono">
        </div>
        <div class="w-28">
          <label class="block text-xs font-medium text-slate-400 mb-1">Type</label>
          <select x-model="newACL.acl_type"
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
            <option value="allow">Allow</option>
            <option value="deny">Deny</option>
          </select>
        </div>
        <button type="submit" :disabled="addingACL"
          class="px-4 py-2 bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white text-sm font-semibold rounded-lg transition shrink-0">
          <span x-text="addingACL ? '…' : 'Add'"></span>
        </button>
      </form>
      <p class="text-xs text-slate-500 mt-3">Rules evaluated deny-first, in order. Empty list = allow all.</p>
    </div>
  </div>

  <!-- Add Tunnel Modal -->
  <div x-show="showTunnel" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="showTunnel = false">    <div class="absolute inset-0 bg-black/60" @click="showTunnel = false" x-transition.opacity></div>
    <div class="relative bg-surface-800 border border-surface-700 rounded-xl p-6 w-full max-w-md shadow-2xl" x-transition>
      <h3 class="text-lg font-semibold text-white mb-4">Add Tunnel Configuration</h3>
      <form @submit.prevent="createTunnel" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Label</label>
          <input type="text" x-model="newTunnel.label" required pattern="^[a-z0-9]([a-z0-9-]{0,62}[a-z0-9])?$"
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition font-mono"
            placeholder="web">
          <p class="text-xs text-slate-500 mt-1">Becomes part of the public URL: <span class="text-brand-400" x-text="(newTunnel.label || 'label') + '-' + (tunnelAgent?.agent_id || 'agent') + '.tunneledge.dev'"></span></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Local Address</label>
          <input type="text" x-model="newTunnel.local_addr" required
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition font-mono"
            placeholder="localhost:3000">
        </div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" @click="showTunnel = false" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition">Cancel</button>
          <button type="submit" :disabled="creatingTunnel" class="px-4 py-2 bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white text-sm font-semibold rounded-lg transition">
            <span x-text="creatingTunnel ? 'Adding…' : 'Add Tunnel'"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Agents list -->
  <div class="space-y-4">
    <template x-if="agents.length === 0 && !loading">
      <div class="bg-surface-800 border border-surface-700 rounded-xl px-5 py-16 text-center">
        <svg class="w-12 h-12 mx-auto text-slate-600 mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7"/></svg>
        <p class="text-slate-400 text-sm">No agents configured yet.</p>
        <p class="text-slate-500 text-xs mt-1">Create your first agent to start tunneling.</p>
      </div>
    </template>

    <template x-for="a in agents" :key="a.id">
      <div class="bg-surface-800 border border-surface-700 rounded-xl overflow-hidden">
        <div class="flex items-center gap-4 px-5 py-4 cursor-pointer hover:bg-surface-700/30 transition" @click="a._expanded = !a._expanded">
          <div class="w-2.5 h-2.5 rounded-full shrink-0" :class="a._online ? 'bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,.5)]' : 'bg-slate-600'"></div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-white" x-text="a.name"></p>
            <p class="text-xs text-slate-500 font-mono mt-0.5" x-text="a.agent_id"></p>
          </div>
          <span class="hidden sm:inline text-xs px-2.5 py-1 rounded-full" :class="a._online ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-700/50 text-slate-500'" x-text="a._online ? 'Online' : 'Offline'"></span>
          <svg class="w-5 h-5 text-slate-500 transition-transform" :class="a._expanded && 'rotate-180'" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </div>

        <!-- Expanded detail -->
        <div x-show="a._expanded" x-collapse x-cloak class="border-t border-surface-700 px-5 py-4 space-y-4">
          <!-- Actions -->
          <div class="flex flex-wrap gap-2">
            <button @click="showTunnelModal(a)" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-brand-500/10 text-brand-400 hover:bg-brand-500/20 text-xs font-medium rounded-lg transition">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
              Add Tunnel
            </button>
            <button @click="copyCachedToken(a)"
              :title="cachedTokens[a.agent_id] ? 'Copy token (cached in memory until page refresh)' : 'Token not available — rotate to get a new one'"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg transition"
              :class="cachedTokens[a.agent_id] ? 'bg-slate-500/10 text-slate-300 hover:bg-slate-500/20' : 'bg-slate-800/50 text-slate-600 cursor-not-allowed'">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 4.5h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V6.75c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z"/></svg>
              Copy Token
            </button>
            <button @click="promptRotateToken(a)" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-amber-500/10 text-amber-400 hover:bg-amber-500/20 text-xs font-medium rounded-lg transition">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
              Rotate Token
            </button>
            <button @click="showACLModal(a)" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-violet-500/10 text-violet-400 hover:bg-violet-500/20 text-xs font-medium rounded-lg transition">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
              IP ACLs
            </button>
            <button @click="promptDeleteAgent(a)" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 text-xs font-medium rounded-lg transition">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
              Delete
            </button>
          </div>

          <!-- Security status (Phase 3) -->
          <template x-if="a.locked_until || a.failed_auth_count > 0 || a.token_expires_at || a.last_used_at">
            <div class="bg-surface-900/60 border border-surface-700 rounded-lg px-4 py-3 space-y-1.5">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Security Status</p>
              <template x-if="a.locked_until">
                <div class="flex items-center gap-2 text-xs">
                  <span class="w-1.5 h-1.5 rounded-full bg-red-400 shrink-0"></span>
                  <span class="text-red-400 font-medium">Locked</span>
                  <span class="text-slate-500">until</span>
                  <span class="text-slate-300 font-mono" x-text="new Date(a.locked_until).toLocaleString()"></span>
                </div>
              </template>
              <template x-if="a.failed_auth_count > 0">
                <div class="flex items-center gap-2 text-xs">
                  <span class="w-1.5 h-1.5 rounded-full bg-amber-400 shrink-0"></span>
                  <span class="text-amber-400 font-medium" x-text="a.failed_auth_count + ' failed auth attempt' + (a.failed_auth_count !== 1 ? 's' : '')"></span>
                </div>
              </template>
              <template x-if="a.token_expires_at">
                <div class="flex items-center gap-2 text-xs">
                  <span class="w-1.5 h-1.5 rounded-full bg-slate-400 shrink-0"></span>
                  <span class="text-slate-400">Token expires</span>
                  <span class="text-slate-300 font-mono" x-text="new Date(a.token_expires_at).toLocaleDateString()"></span>
                </div>
              </template>
              <template x-if="a.last_used_at">
                <div class="flex items-center gap-2 text-xs">
                  <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shrink-0"></span>
                  <span class="text-slate-400">Last used</span>
                  <span class="text-slate-300 font-mono" x-text="new Date(a.last_used_at).toLocaleString()"></span>
                </div>
              </template>
            </div>
          </template>

          <!-- Tunnels -->
          <div>
            <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tunnel Configurations</h4>
            <div class="space-y-2">
              <template x-if="!a._tunnels || a._tunnels.length === 0">
                <p class="text-xs text-slate-500 italic">No tunnel configurations</p>
              </template>
              <template x-for="t in (a._tunnels || [])" :key="t.id">
                <div class="flex items-center justify-between bg-surface-900 rounded-lg px-4 py-2.5">
                  <div class="flex items-center gap-3 min-w-0">
                    <span class="inline-block w-2 h-2 rounded-full bg-brand-400 shrink-0"></span>
                    <span class="text-sm font-mono text-white truncate" x-text="t.label"></span>
                    <svg class="w-4 h-4 text-slate-600 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                    <span class="text-sm font-mono text-slate-400 truncate" x-text="t.local_addr"></span>
                  </div>
                  <button @click="promptDeleteTunnel(a, t)" class="text-slate-600 hover:text-red-400 transition ml-2 shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
function agentsPage() {
  return {
    agents: [], loading: true,
    showCreate: false, creating: false,
    newAgent: { name: '', agent_id: '' },
    tokenRevealed: false, revealedToken: '', tokenRevealContext: 'created',
    cachedTokens: {},
    showTunnel: false, creatingTunnel: false,
    tunnelAgent: null,
    newTunnel: { label: '', local_addr: '' },
    // ACL state
    showACL: false, aclAgent: null, aclRules: [],
    newACL: { cidr: '', acl_type: 'allow' }, addingACL: false,
    confirm: { show: false, title: '', message: '', okLabel: '', danger: false, onOk: () => {} },

    askConfirm({ title, message, okLabel, danger, onOk }) {
      this.confirm = { show: true, title, message, okLabel, danger: !!danger, onOk };
    },

    async load() {
      this.loading = true;
      try {
        const [agentsRes, sessionsRes] = await Promise.all([
          fetch('/api/v1/agents'), fetch('/api/v1/sessions')
        ]);
        if (agentsRes.ok) {
          this.agents = (await agentsRes.json()).map(a => ({...a, _expanded: false, _tunnels: [], _online: false}));
          for (const a of this.agents) {
            try {
              const tr = await fetch(`/api/v1/agents/${a.id}/tunnels`);
              if (tr.ok) a._tunnels = await tr.json();
            } catch {}
          }
        }
        if (sessionsRes.ok) {
          const sessions = await sessionsRes.json();
          const onlineAgents = new Set(sessions.map(s => s.agent_id));
          this.agents.forEach(a => { a._online = onlineAgents.has(a.agent_id); });
        }
      } catch {} finally { this.loading = false; }
    },

    async createAgent() {
      this.creating = true;
      try {
        const res = await fetch('/api/v1/agents', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.newAgent)
        });
        const data = await res.json();
        if (!res.ok) { notify(data.error || 'Failed to create agent', 'error'); return; }
        this.cachedTokens[data.agent_id] = data.token;
        this.tokenRevealContext = 'created';
        this.revealedToken = data.token;
        this.tokenRevealed = true;
        this.showCreate = false;
        this.newAgent = { name: '', agent_id: '' };
        await this.load();
        notify('Agent created successfully', 'success');
      } catch { notify('Failed to create agent', 'error'); }
      finally { this.creating = false; }
    },

    promptRotateToken(agent) {
      this.askConfirm({
        title: 'Rotate Token',
        message: `Rotating the token for "${agent.name}" will immediately invalidate the current token. Any connected agent will need to reconnect with the new token.`,
        okLabel: 'Rotate',
        danger: false,
        onOk: () => this.rotateToken(agent)
      });
    },

    async rotateToken(agent) {
      try {
        const res = await fetch(`/api/v1/agents/${agent.id}/rotate-token`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) { notify(data.error || 'Failed to rotate token', 'error'); return; }
        this.cachedTokens[data.agent_id] = data.token;
        this.tokenRevealContext = 'rotated';
        this.revealedToken = data.token;
        this.tokenRevealed = true;
        notify('Token rotated — save the new token!', 'warn', 8000);
      } catch { notify('Failed to rotate token', 'error'); }
    },

    promptDeleteAgent(agent) {
      this.askConfirm({
        title: 'Delete Agent',
        message: `Permanently delete "${agent.name}" and all its tunnel configurations? This cannot be undone.`,
        okLabel: 'Delete',
        danger: true,
        onOk: () => this.deleteAgent(agent)
      });
    },

    async deleteAgent(agent) {
      try {
        const res = await fetch(`/api/v1/agents/${agent.id}`, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) { notify('Failed to delete agent', 'error'); return; }
        this.agents = this.agents.filter(a => a.id !== agent.id);
        notify(`Agent "${agent.name}" deleted`, 'success');
      } catch { notify('Failed to delete agent', 'error'); }
    },

    showTunnelModal(agent) {
      this.tunnelAgent = agent;
      this.newTunnel = { label: '', local_addr: '' };
      this.showTunnel = true;
    },

    async createTunnel() {
      this.creatingTunnel = true;
      try {
        const res = await fetch(`/api/v1/agents/${this.tunnelAgent.id}/tunnels`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.newTunnel)
        });
        const data = await res.json();
        if (!res.ok) { notify(data.error || 'Failed to add tunnel', 'error'); return; }
        this.tunnelAgent._tunnels = [...(this.tunnelAgent._tunnels || []), data];
        this.showTunnel = false;
        notify(`Tunnel "${data.label}" added`, 'success');
      } catch { notify('Failed to add tunnel', 'error'); }
      finally { this.creatingTunnel = false; }
    },

    promptDeleteTunnel(agent, tunnel) {
      this.askConfirm({
        title: 'Delete Tunnel',
        message: `Remove tunnel "${tunnel.label}" (${tunnel.local_addr})?`,
        okLabel: 'Delete',
        danger: true,
        onOk: () => this.deleteTunnel(agent, tunnel)
      });
    },

    async deleteTunnel(agent, tunnel) {
      try {
        const res = await fetch(`/api/v1/agents/${agent.id}/tunnels/${tunnel.id}`, { method: 'DELETE' });
        if (res.ok || res.status === 204) {
          agent._tunnels = agent._tunnels.filter(t => t.id !== tunnel.id);
          notify(`Tunnel "${tunnel.label}" removed`, 'success');
        } else { notify('Failed to delete tunnel', 'error'); }
      } catch { notify('Failed to delete tunnel', 'error'); }
    },

    async showACLModal(agent) {
      this.aclAgent = agent;
      this.aclRules = [];
      this.newACL = { cidr: '', acl_type: 'allow' };
      this.showACL = true;
      try {
        const res = await fetch(`/api/v1/agents/${agent.id}/acls`);
        if (res.ok) this.aclRules = await res.json();
        else if (res.status === 404) this.aclRules = []; // ACLs not enabled
      } catch {}
    },

    async addACLRule() {
      this.addingACL = true;
      try {
        const res = await fetch(`/api/v1/agents/${this.aclAgent.id}/acls`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.newACL)
        });
        const data = await res.json();
        if (!res.ok) { notify(data.error || 'Failed to add rule', 'error'); return; }
        this.aclRules = [...this.aclRules, data];
        this.newACL = { cidr: '', acl_type: 'allow' };
        notify('ACL rule added', 'success');
      } catch { notify('Failed to add rule', 'error'); }
      finally { this.addingACL = false; }
    },

    async deleteACLRule(rule) {
      try {
        const res = await fetch(`/api/v1/agents/${this.aclAgent.id}/acls/${rule.id}`, { method: 'DELETE' });
        if (res.ok || res.status === 204) {
          this.aclRules = this.aclRules.filter(r => r.id !== rule.id);
          notify('ACL rule removed', 'success');
        } else { notify('Failed to remove rule', 'error'); }
      } catch { notify('Failed to remove rule', 'error'); }
    },

    copyToken() {
      navigator.clipboard.writeText(this.revealedToken);
      notify('Token copied to clipboard', 'success', 2000);
    },

    copyCachedToken(agent) {
      const token = this.cachedTokens[agent.agent_id];
      if (!token) {
        notify('Token not available in memory — rotate to get a new one', 'warn');
        return;
      }
      navigator.clipboard.writeText(token);
      notify('Token copied to clipboard', 'success', 2000);
    }
  }
}
</script>
