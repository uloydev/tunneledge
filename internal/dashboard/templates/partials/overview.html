<!-- Overview partial loaded via HTMX -->
<div class="space-y-6" x-data="overviewPage()" x-init="load()">
  <div>
    <h1 class="text-2xl font-bold text-white">Overview</h1>
    <p class="text-slate-400 text-sm mt-1">Your TunnelEdge dashboard at a glance</p>
  </div>

  <!-- Stats grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <div class="bg-surface-800 border border-surface-700 rounded-xl p-5">
      <div class="flex items-center justify-between">
        <p class="text-sm text-slate-400">Total Agents</p>
        <div class="w-9 h-9 rounded-lg bg-brand-500/10 flex items-center justify-center">
          <svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7"/></svg>
        </div>
      </div>
      <p class="mt-3 text-3xl font-bold text-white" x-text="stats.agents"></p>
    </div>

    <div class="bg-surface-800 border border-surface-700 rounded-xl p-5">
      <div class="flex items-center justify-between">
        <p class="text-sm text-slate-400">Online</p>
        <div class="w-9 h-9 rounded-lg bg-emerald-500/10 flex items-center justify-center">
          <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
      </div>
      <p class="mt-3 text-3xl font-bold text-emerald-400" x-text="stats.online"></p>
    </div>

    <div class="bg-surface-800 border border-surface-700 rounded-xl p-5">
      <div class="flex items-center justify-between">
        <p class="text-sm text-slate-400">Tunnel Configs</p>
        <div class="w-9 h-9 rounded-lg bg-violet-500/10 flex items-center justify-center">
          <svg class="w-5 h-5 text-violet-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
        </div>
      </div>
      <p class="mt-3 text-3xl font-bold text-white" x-text="stats.tunnels"></p>
    </div>

    <div class="bg-surface-800 border border-surface-700 rounded-xl p-5">
      <div class="flex items-center justify-between">
        <p class="text-sm text-slate-400">Active Sessions</p>
        <div class="w-9 h-9 rounded-lg bg-amber-500/10 flex items-center justify-center">
          <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
        </div>
      </div>
      <p class="mt-3 text-3xl font-bold text-amber-400" x-text="stats.sessions"></p>
    </div>
  </div>

  <!-- Agents list -->
  <div class="bg-surface-800 border border-surface-700 rounded-xl">
    <div class="flex items-center justify-between px-5 py-4 border-b border-surface-700">
      <h2 class="text-lg font-semibold text-white">Your Agents</h2>
      <a href="/dashboard/agents" hx-get="/partials/agents" hx-target="#main-content" hx-push-url="/dashboard/agents"
        class="text-sm text-brand-400 hover:text-brand-300">View all →</a>
    </div>
    <div class="divide-y divide-surface-700">
      <template x-if="agents.length === 0">
        <div class="px-5 py-10 text-center text-slate-500">
          <p class="text-sm">No agents yet. Create one to get started.</p>
          <a href="/dashboard/agents" hx-get="/partials/agents" hx-target="#main-content" hx-push-url="/dashboard/agents"
            class="inline-flex items-center gap-1.5 mt-3 text-sm text-brand-400 hover:text-brand-300">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Create Agent
          </a>
        </div>
      </template>
      <template x-for="a in agents" :key="a.id">
        <div class="flex items-center gap-4 px-5 py-3.5 hover:bg-surface-700/30 transition">
          <div class="w-2.5 h-2.5 rounded-full shrink-0" :class="a._online ? 'bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,.5)]' : 'bg-slate-600'"></div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-white truncate" x-text="a.name"></p>
            <p class="text-xs text-slate-500 font-mono" x-text="a.agent_id"></p>
          </div>
          <span class="text-xs px-2 py-1 rounded-full" :class="a._online ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-700 text-slate-400'" x-text="a._online ? 'Online' : 'Offline'"></span>
        </div>
      </template>
    </div>
  </div>
</div>

<script>
function overviewPage() {
  return {
    stats: { agents: 0, online: 0, tunnels: 0, sessions: 0 },
    agents: [],
    async load() {
      try {
        const [agentsRes, sessionsRes] = await Promise.all([
          fetch('/api/v1/agents'),
          fetch('/api/v1/sessions')
        ]);
        if (agentsRes.ok) {
          this.agents = await agentsRes.json();
          this.stats.agents = this.agents.length;
          // Fetch tunnels per agent
          let tunnelCount = 0;
          for (const a of this.agents) {
            try {
              const tr = await fetch(`/api/v1/agents/${a.id}/tunnels`);
              if (tr.ok) { const t = await tr.json(); tunnelCount += t.length; }
            } catch {}
          }
          this.stats.tunnels = tunnelCount;
        }
        if (sessionsRes.ok) {
          const sessions = await sessionsRes.json();
          this.stats.sessions = sessions.length;
          // Mark agents online
          const onlineAgents = new Set(sessions.map(s => s.agent_id));
          this.agents.forEach(a => { a._online = onlineAgents.has(a.agent_id); });
          this.stats.online = onlineAgents.size;
        }
      } catch {}
    }
  }
}
</script>
