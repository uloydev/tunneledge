<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}TunnelEdge{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f9ff', 100:'#e0f2fe', 200:'#bae6fd', 300:'#7dd3fc', 400:'#38bdf8', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1', 800:'#075985', 900:'#0c4a6e' },
            surface: { 50:'#f8fafc', 100:'#f1f5f9', 700:'#334155', 800:'#1e293b', 900:'#0f172a', 950:'#020617' },
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .toast-enter { animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    .toast-leave { animation: toastOut 0.25s ease-in forwards; }
    @keyframes toastOut { to { opacity: 0; transform: translateX(110%); } }
    @keyframes progress { from { width: 100%; } to { width: 0%; } }
    .toast-progress { animation: progress var(--duration, 4s) linear forwards; }
  </style>
</head>
<body class="h-full bg-surface-900 text-slate-200 dark" hx-boost="true">

  <!-- ── Toast notification system ─────────────────────────────────── -->
  <div id="toast-container"
       class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 w-80 pointer-events-none"
       x-data="toastManager()"
       @notify.window="add($event.detail)">
    <template x-for="t in toasts" :key="t.id">
      <div class="pointer-events-auto toast-enter rounded-xl shadow-2xl border overflow-hidden"
           :class="{
             'bg-surface-800 border-emerald-500/30': t.type === 'success',
             'bg-surface-800 border-red-500/30':     t.type === 'error',
             'bg-surface-800 border-amber-500/30':   t.type === 'warn',
             'bg-surface-800 border-brand-500/30':   t.type === 'info',
           }">
        <div class="flex items-start gap-3 px-4 py-3">
          <!-- Icon -->
          <div class="shrink-0 mt-0.5">
            <template x-if="t.type === 'success'">
              <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </template>
            <template x-if="t.type === 'error'">
              <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
            </template>
            <template x-if="t.type === 'warn'">
              <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
            </template>
            <template x-if="t.type === 'info'">
              <svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
            </template>
          </div>
          <!-- Message -->
          <p class="flex-1 text-sm text-slate-200 leading-snug" x-text="t.message"></p>
          <!-- Dismiss -->
          <button @click="dismiss(t.id)" class="shrink-0 text-slate-500 hover:text-slate-300 transition mt-0.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <!-- Progress bar -->
        <div class="h-0.5 mx-4 mb-2 rounded-full bg-slate-700 overflow-hidden">
          <div class="toast-progress h-full rounded-full"
               :style="'--duration:' + t.duration + 'ms'"
               :class="{
                 'bg-emerald-400': t.type === 'success',
                 'bg-red-400':     t.type === 'error',
                 'bg-amber-400':   t.type === 'warn',
                 'bg-brand-400':   t.type === 'info',
               }"></div>
        </div>
      </div>
    </template>
  </div>

  {{block "content" .}}{{end}}

  <script>
  function toastManager() {
    return {
      toasts: [],
      add({ message, type = 'info', duration = 4000 }) {
        const id = Date.now() + Math.random();
        this.toasts.push({ id, message, type, duration });
        setTimeout(() => this.dismiss(id), duration);
      },
      dismiss(id) {
        this.toasts = this.toasts.filter(t => t.id !== id);
      }
    };
  }

  function notify(message, type = 'info', duration = 4000) {
    window.dispatchEvent(new CustomEvent('notify', { detail: { message, type, duration } }));
  }

  // HTMX global error → toast
  document.body.addEventListener('htmx:responseError', function(e) {
    try {
      const data = JSON.parse(e.detail.xhr.responseText);
      notify(data.error || 'Something went wrong', 'error');
    } catch {
      notify('Something went wrong', 'error');
    }
  });

  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target.id === 'main-content') {
      e.detail.target.classList.add('fade-in');
    }
  });
  </script>
</body>
</html>
