{{define "title"}}Sign In — TunnelEdge{{end}}
{{define "content"}}
<div class="min-h-full flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md space-y-8">
    <!-- Logo -->
    <div class="text-center">
      <div class="inline-flex items-center gap-2 mb-2">
        <svg class="w-8 h-8 text-brand-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span class="text-2xl font-bold text-white">TunnelEdge</span>
      </div>
      <p class="text-slate-400 text-sm">Sign in to manage your tunnels</p>
    </div>

    <!-- Card -->
    <div class="bg-surface-800 border border-surface-700 rounded-xl p-8 shadow-xl" x-data="loginForm()">
      {{if .Verified}}
      <div class="mb-6 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm text-center">
        ✓ Email verified successfully! You can now sign in.
      </div>
      {{end}}

      <form @submit.prevent="submit" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
          <input type="email" id="email" x-model="email" required
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input type="password" id="password" x-model="password" required
            class="w-full rounded-lg bg-surface-900 border border-surface-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="••••••••">
        </div>

        <button type="submit" :disabled="loading"
          class="w-full flex items-center justify-center gap-2 rounded-lg bg-brand-500 hover:bg-brand-600 disabled:opacity-50 px-4 py-2.5 text-white font-semibold transition">
          <svg x-show="loading" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span x-text="loading ? 'Signing in…' : 'Sign In'"></span>
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-400">
        Don't have an account?
        <a href="/register" class="text-brand-400 hover:text-brand-300 font-medium">Create one</a>
      </p>
    </div>
  </div>
</div>

<script>
function loginForm() {
  return {
    email: '', password: '', loading: false,
    async submit() {
      this.loading = true;
      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: this.email, password: this.password })
        });
        const data = await res.json();
        if (!res.ok) {
          notify(data.error || 'Invalid credentials', 'error');
          return;
        }
        notify('Welcome back!', 'success', 2000);
        setTimeout(() => { window.location.href = '/dashboard'; }, 400);
      } catch {
        notify('Network error, please try again', 'error');
      } finally { this.loading = false; }
    }
  }
}
</script>
{{end}}
