worker_processes auto;

events {
  worker_connections 1024;
}

stream {
  upstream tunneledge_public_tls {
    server gateway:443 max_fails=2 fail_timeout=5s;
    server gateway-2:443 backup;
  }

  server {
    listen 443;
    proxy_connect_timeout 2s;
    proxy_timeout 1h;
    proxy_pass tunneledge_public_tls;
    ssl_preread on;
  }
}
