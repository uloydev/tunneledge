services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tunneledge
      POSTGRES_PASSWORD: tunneledge
      POSTGRES_DB: tunneledge
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports:
      # - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunneledge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  prometheus:
    image: prom/prometheus:v2.53.4
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      registry:
        condition: service_started
      gateway:
        condition: service_started
      dashboard:
        condition: service_started
      agent:
        condition: service_started
    networks:
      - tunneledge

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - tunneledge

  registry:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.registry
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - TE_REGISTRY_GRPC_LISTEN_ADDR=:50051
      - TE_REGISTRY_SESSION_TTL=5m
      - TE_REGISTRY_CLEANUP_INTERVAL=30s
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_DB_DRIVER=postgres
      - TE_DB_DSN=host=postgres port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable
      - TE_DB_AUTO_MIGRATE=true
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.gateway
    ports:
      - "4433:4433/udp"
      - "5443:443"
    depends_on:
      registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - TE_GATEWAY_QUIC_LISTEN_ADDR=:4433
      - TE_GATEWAY_PUBLIC_LISTEN_ADDR=:443
      - TE_GATEWAY_BASE_DOMAIN=tunneledge.uloy.dev
      - TE_GATEWAY_REGISTRY_ADDR=registry:50051
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_GATEWAY_SHUTDOWN_TIMEOUT=15s
      - TE_GATEWAY_STREAM_IDLE_TIMEOUT=30s
      - TE_DB_DRIVER=postgres
      - TE_DB_DSN=host=postgres port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable
      - TE_DB_AUTO_MIGRATE=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "18025:8025"
      - "11025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  dashboard:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.dashboard
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      - TE_DASHBOARD_HTTP_LISTEN_ADDR=:8080
      - TE_DASHBOARD_JWT_SECRET=change-me-in-production
      - TE_DASHBOARD_JWT_TTL=24h
      - TE_DASHBOARD_BASE_URL=http://localhost:8082
      - TE_DASHBOARD_SMTP_HOST=mailpit
      - TE_DASHBOARD_SMTP_PORT=1025
      - TE_DASHBOARD_SMTP_FROM=noreply@tunneledge.dev
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_DB_DRIVER=postgres
      - TE_DB_DSN=host=postgres port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable
      - TE_DB_AUTO_MIGRATE=true
    networks:
      - tunneledge

  agent:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.agent
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_AGENT_HEARTBEAT_INTERVAL=15s
      - TE_AGENT_RECONNECT_DELAY=2s
      - TE_AGENT_STREAM_IDLE_TIMEOUT=30s
    command:
      - headless
      - --gateway-addr=gateway:4433
      - --token=dev-token
      - --metrics-addr=:9090
      # - --tunnel=web=echo:6666
      - --tunnel=api=http-echo:8080
    networks:
      - tunneledge

  # agent-2:
  #   build:
  #     context: ../..
  #     dockerfile: deployments/docker/Dockerfile.agent
  #   depends_on:
  #     - gateway
  #   environment:
  #     - TE_LOG_LEVEL=info
  #     - TE_LOG_FORMAT=json
  #   command:
  #     - --gateway-addr=gateway:4433
  #     - --token=dev-token-2
  #     - --tunnel=web=echo:6666
  #     - --tunnel=api=http-echo:8080
  #   networks:
  #     - tunneledge

  http-echo:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.http-echo
    environment:
      - TE_LISTEN_ADDR=:8080
    # ports:
    #   - "8080:8080"
    networks:
      - tunneledge

  echo:
    image: alpine/socat
    command: TCP-LISTEN:6666,fork EXEC:"/bin/cat"
    # ports:
    #   - "6666:6666"
    networks:
      - tunneledge

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tunneledge

volumes:
  pgdata:
  grafana-data:

networks:
  tunneledge:
    driver: bridge
