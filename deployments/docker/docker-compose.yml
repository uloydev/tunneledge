# Default TunnelEdge deployment topology.
#
# Phase 2 multi-active layout:
#   - Two gateways with shared registry coordination.
#   - Agent-side failover targets; either gateway can serve any tunnel via
#     the distributed watch-driven router.
#   - Single public TCP edge (nginx) that round-robins / fails over between
#     gateways.
#   - Registry uses the in-memory coordinator by default.
#     For HA deployments uncomment TE_REGISTRY_ETCD_ENDPOINTS and ensure
#     the etcd service is running.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tunneledge
      POSTGRES_PASSWORD: tunneledge
      POSTGRES_DB: tunneledge
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports:
      # - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunneledge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  prometheus:
    image: prom/prometheus:v2.53.4
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      registry:
        condition: service_started
      gateway:
        condition: service_started
      gateway-2:
        condition: service_started
      dashboard:
        condition: service_started
      agent:
        condition: service_started
    networks:
      - tunneledge

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - tunneledge

  registry:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.registry
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - TE_REGISTRY_GRPC_LISTEN_ADDR=:50051
      - TE_REGISTRY_SESSION_TTL=5m
      - TE_REGISTRY_CLEANUP_INTERVAL=30s
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      - TE_DB_DRIVER=postgres
      - TE_DB_DSN=host=postgres port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable
      - TE_DB_AUTO_MIGRATE=true
      # Uncomment to enable the etcd coordinator for multi-instance HA:
      # - TE_REGISTRY_ETCD_ENDPOINTS=http://etcd:2379
      # - TE_REGISTRY_ETCD_DIAL_TIMEOUT=5s
      # Phase 3: gRPC rate limiting
      # - TE_REGISTRY_AUTH_RATE_LIMIT_RPM=120
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.gateway
    ports:
      - "4433:4433/udp"
    depends_on:
      registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - TE_GATEWAY_QUIC_LISTEN_ADDR=:4433
      - TE_GATEWAY_PUBLIC_LISTEN_ADDR=:443
      - TE_GATEWAY_BASE_DOMAIN=tunneledge.uloy.dev
      - TE_GATEWAY_REGISTRY_ADDR=registry:50051
      - TE_GATEWAY_RELAY_ID=gateway-1
      - TE_GATEWAY_ADVERTISE_ADDR=gateway:4433
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_GATEWAY_LEASE_TTL=45s
      - TE_GATEWAY_HEALTH_REPORT_INTERVAL=15s
      - TE_GATEWAY_SHUTDOWN_TIMEOUT=15s
      - TE_GATEWAY_STREAM_IDLE_TIMEOUT=30s
      - TE_DB_DRIVER=postgres
      - TE_DB_DSN=host=postgres port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable
      - TE_DB_AUTO_MIGRATE=true
      # Phase 3: abuse prevention
      # - TE_GATEWAY_AUTH_RATE_LIMIT_RPM=60
      # - TE_GATEWAY_MAX_TUNNELS_PER_AGENT=10
      # - TE_GATEWAY_MAX_STREAMS_PER_TUNNEL=100
      # Phase 3: mTLS (mount certs volume)
      # - TE_GATEWAY_MTLS_ENABLED=true
      # - TE_GATEWAY_CLIENT_CA_FILE=/certs/ca.crt
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  gateway-2:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.gateway
    ports:
      - "4434:4433/udp"
    depends_on:
      registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - TE_GATEWAY_QUIC_LISTEN_ADDR=:4433
      - TE_GATEWAY_PUBLIC_LISTEN_ADDR=:443
      - TE_GATEWAY_BASE_DOMAIN=tunneledge.uloy.dev
      - TE_GATEWAY_REGISTRY_ADDR=registry:50051
      - TE_GATEWAY_RELAY_ID=gateway-2
      - TE_GATEWAY_ADVERTISE_ADDR=gateway-2:4433
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_GATEWAY_LEASE_TTL=45s
      - TE_GATEWAY_HEALTH_REPORT_INTERVAL=15s
      - TE_GATEWAY_SHUTDOWN_TIMEOUT=15s
      - TE_GATEWAY_STREAM_IDLE_TIMEOUT=30s
      - TE_DB_DRIVER=postgres
      - TE_DB_DSN=host=postgres port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable
      - TE_DB_AUTO_MIGRATE=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  edge:
    image: nginx:1.27-alpine
    ports:
      - "5443:443"
    volumes:
      - ./nginx-stream.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
      gateway-2:
        condition: service_healthy
    networks:
      - tunneledge

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "18025:8025"
      - "11025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tunneledge

  dashboard:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.dashboard
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      - TE_DASHBOARD_HTTP_LISTEN_ADDR=:8080
      - TE_DASHBOARD_JWT_SECRET=change-me-in-production
      - TE_DASHBOARD_JWT_TTL=24h
      - TE_DASHBOARD_BASE_URL=http://localhost:8082
      - TE_DASHBOARD_SMTP_HOST=mailpit
      - TE_DASHBOARD_SMTP_PORT=1025
      - TE_DASHBOARD_SMTP_FROM=noreply@tunneledge.dev
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_DB_DRIVER=postgres
      - TE_DB_DSN=host=postgres port=5432 user=tunneledge password=tunneledge dbname=tunneledge sslmode=disable
      - TE_DB_AUTO_MIGRATE=true
      # Phase 3: security hardening
      # - TE_DASHBOARD_REFRESH_TOKEN_ENABLED=true
      # - TE_DASHBOARD_REFRESH_TOKEN_TTL=168h
      # - TE_DASHBOARD_AUTH_RATE_LIMIT_RPM=20
    networks:
      - tunneledge

  agent:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.agent
    depends_on:
      gateway:
        condition: service_healthy
      gateway-2:
        condition: service_healthy
    environment:
      - TE_LOG_LEVEL=info
      - TE_LOG_FORMAT=json
      - TE_OBSERVABILITY_METRICS_ENABLED=true
      - TE_OBSERVABILITY_METRICS_ADDR=:9090
      - TE_OBSERVABILITY_TRACING_ENABLED=false
      # - TE_OBSERVABILITY_TRACING_ENDPOINT=otel-collector:4317
      - TE_AGENT_HEARTBEAT_INTERVAL=15s
      - TE_AGENT_RECONNECT_DELAY=2s
      - TE_AGENT_STREAM_IDLE_TIMEOUT=30s
    command:
      - headless
      - --gateway-addrs=gateway:4433
      - --gateway-addrs=gateway-2:4433
      - --token=dev-token
      - --metrics-addr=:9090
      # - --tunnel=web=echo:6666
      - --tunnel=api=http-echo:8080
    networks:
      - tunneledge

  # agent-2:
  #   build:
  #     context: ../..
  #     dockerfile: deployments/docker/Dockerfile.agent
  #   depends_on:
  #     - gateway
  #   environment:
  #     - TE_LOG_LEVEL=info
  #     - TE_LOG_FORMAT=json
  #   command:
  #     - --gateway-addr=gateway:4433
  #     - --token=dev-token-2
  #     - --tunnel=web=echo:6666
  #     - --tunnel=api=http-echo:8080
  #   networks:
  #     - tunneledge

  http-echo:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.http-echo
    environment:
      - TE_LISTEN_ADDR=:8080
    # ports:
    #   - "8080:8080"
    networks:
      - tunneledge

  echo:
    image: alpine/socat
    command: TCP-LISTEN:6666,fork EXEC:"/bin/cat"
    # ports:
    #   - "6666:6666"
    networks:
      - tunneledge

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tunneledge

volumes:
  pgdata:
  grafana-data:
  # etcd-data:  # uncomment when etcd service is enabled

networks:
  tunneledge:
    driver: bridge

